<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/aura-logo.png" />
    <title>AURA Inventory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
      // theming_strategy.md §5 — 깜빡임 방지. body mount 전 사전 적용.
      // localStorage 키는 appStore.js 와 동일 ('aura.theme'). idempotent.
      (function () {
        try {
          if (localStorage.getItem('aura.theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.documentElement.setAttribute('data-bs-theme', 'dark');
          }
        } catch (e) { /* private mode 등 — 무시, light 기본 */ }
      })();
    </script>
  </head>
  <body>
    <div id="view-root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
